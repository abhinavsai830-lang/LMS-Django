{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4">Admin Dashboard</h2>

<div class="row">

<div class="col-md-6">
<div class="card p-3 shadow">
<h4>Total Users</h4>
<p>{{ users|length }}</p>
</div>
</div>

<div class="col-md-6">
<div class="card p-3 shadow">
<h4>Total Courses</h4>
<p>{{ courses|length }}</p>
</div>
</div>

</div>

<hr>

<h3 class="mt-4">Users</h3>
<a href="/add-course/" class="btn btn-primary mb-3">
Add New Course
</a>
<table class="table table-bordered">

<tr>
<th>Username</th>
<th>Email</th>
<th>Role</th>
</tr>

{% for user in users %}

<tr>
<td>{{user.username}}</td>
<td>{{user.email}}</td>
<td>{{user.role}}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
